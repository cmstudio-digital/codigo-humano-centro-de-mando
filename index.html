<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Centro de Mando</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; }
        button { width: 100%; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Centro de Mando</h1>
        <input type="email" id="email" placeholder="Correo">
        <input type="password" id="password" placeholder="Contraseña">
        <button id="btn">Registrarse</button>
    </div>

    <script>
        // Configuración única
        const SUPABASE_URL = 'https://rxerpjpsuvjybjccyzmn.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_x45XEwk8SGr1P7XU1OBW5g_kiUEN6gz';
        
        // Creamos la constante del cliente una sola vez
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        document.getElementById('btn').addEventListener('click', async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const { data, error } = await supabaseClient.auth.signUp({ 
                    email: email, 
                    password: password 
                });
                
                if (error) throw error;
                
                alert("Registro exitoso. Revisa tu correo.");
                window.location.href = "mundo2.html";
            } catch (err) {
                alert("Error al registrar: " + err.message);
            }
        });
    </script>
</body>
</html>
