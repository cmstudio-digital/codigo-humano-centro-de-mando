<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Centro de Mando</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; margin-top: 10px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Centro de Mando</h2>
        <input type="email" id="email" placeholder="Correo">
        <input type="password" id="password" placeholder="Contraseña">
        <button id="btn-login">Entrar</button>
        <button id="btn-register" style="background:#28a745;">Registrarse</button>
    </div>

    <script>
        const supabase = supabase.createClient(
            'https://rxerpjpsuvjybjccyzmn.supabase.co', 
            'sb_publishable_x45XEwk8SGr1P7XU1OBW5g_kiUEN6gz'
        );

        // Registro
        document.getElementById('btn-register').onclick = async () => {
            const { error } = await supabase.auth.signUp({ 
                email: document.getElementById('email').value, 
                password: document.getElementById('password').value 
            });
            error ? alert(error.message) : alert("Revisa tu correo para confirmar.");
        };

        // Login
        document.getElementById('btn-login').onclick = async () => {
            const { error } = await supabase.auth.signInWithPassword({ 
                email: document.getElementById('email').value, 
                password: document.getElementById('password').value 
            });
            error ? alert(error.message) : window.location.href = "mundo2.html";
        };
    </script>
</body>
</html>
